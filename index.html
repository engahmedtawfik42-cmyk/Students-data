<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Big Hero Robotics Students CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4712/4712139.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}

header{
    padding:20px;
    font-size:22px;
    background:rgba(0,0,0,0.3);
}

.box{padding:15px}

input,select,textarea{
    padding:8px;
    margin:4px;
    border:none;
    border-radius:8px;
    width:150px;
}

textarea{
    height:30px;
    resize:none;
    font-size:12px;
}

button{
    padding:6px 8px;
    margin:2px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.add{background:#00c853}
.danger{background:#e53935}
.editBtn{background:#03a9f4}
.invoice{background:#ff9800}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:rgba(255,255,255,0.1);
}

th,td{
    border:1px solid rgba(255,255,255,0.2);
    padding:6px;
    font-size:13px;
}
</style>
</head>

<body>

<header> Big Hero Robotics Students CRM </header>


<div class="box">

<input type="text" id="groupName" placeholder="المجموعة">
<button class="add" onclick="addGroup()">➕ إضافة</button>

<select id="groups"></select>
<button class="danger" onclick="deleteGroup()">🗑️ حذف</button>

<hr>

<input type="text" id="studentName" placeholder="الطالب">
<input type="number" id="lessonNumber" placeholder="الحصة">

<select id="status">
<option>حاضر</option>
<option>غائب</option>
</select>

<select id="payment">
<option>مدفوع</option>
<option>غير مدفوع</option>
</select>

<input type="number" id="late" placeholder="غرامة">
<textarea id="notes" placeholder="ملاحظات"></textarea>
<input type="date" id="date">

<button class="add" onclick="addStudent()">➕ إضافة طالب</button>

<hr>

<button onclick="exportJSON()" class="add">📤 JSON</button>
<button onclick="exportExcel()" class="add">📊 Excel</button>

<button class="add" onclick="document.getElementById('fileInput').click()">📥 استيراد</button>
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="importJSON(event)">

<hr>

<table>
<thead>
<tr>
<th>المجموعة</th>
<th>الاسم</th>
<th>الحصة</th>
<th>التاريخ</th>
<th>الحضور</th>
<th>الدفع</th>
<th>غرامة</th>
<th>ملاحظات</th>
<th>فاتورة</th>
<th>تعديل</th>
<th>حذف</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<div id="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);padding-top:50px;">
<div style="background:white;color:black;width:320px;margin:auto;padding:15px;border-radius:10px;">

<h3>✏️ تعديل الطالب</h3>

<input id="editName">
<input id="editGroup">
<input id="editLesson" type="number">
<input id="editDate" type="date">

<select id="editStatus">
<option>حاضر</option>
<option>غائب</option>
</select>

<select id="editPayment">
<option>مدفوع</option>
<option>غير مدفوع</option>
</select>

<input id="editLate" type="number">
<textarea id="editNotes"></textarea>

<br><br>

<button class="add" onclick="saveEdit()">💾 حفظ</button>
<button class="danger" onclick="closeModal()">❌ إغلاق</button>

</div>
</div>

<script>

let groups = JSON.parse(localStorage.getItem("groups")) || [];
let records = JSON.parse(localStorage.getItem("records")) || [];
let editIndex = null;

document.getElementById("date").valueAsDate = new Date();

function save(){
    localStorage.setItem("groups",JSON.stringify(groups));
    localStorage.setItem("records",JSON.stringify(records));
    renderGroups();
    render();
}

/* GROUPS */

function addGroup(){
    let g=document.getElementById("groupName").value.trim();
    if(!g) return;

    if(groups.includes(g)) return alert("موجود");

    groups.push(g);
    save();
}

function deleteGroup(){
    let g=document.getElementById("groups").value;
    if(!confirm("حذف المجموعة؟")) return;

    groups=groups.filter(x=>x!==g);
    records=records.filter(r=>r.group!==g);

    save();
}

function renderGroups(){
    let sel=document.getElementById("groups");
    sel.innerHTML="";
    groups.forEach(g=>{
        sel.innerHTML+=`<option>${g}</option>`;
    });
}

/* ADD */

function addStudent(){

    let name=document.getElementById("studentName").value.trim();
    let group=document.getElementById("groups").value;
    let lesson=document.getElementById("lessonNumber").value||1;
    let status=document.getElementById("status").value;
    let payment=document.getElementById("payment").value;
    let late=document.getElementById("late").value||0;
    let notes=document.getElementById("notes").value;
    let date=document.getElementById("date").value;

    if(!name||!group) return;

    let exists=records.some(r=>
        r.name===name && r.group===group && r.lesson==lesson
    );

    if(exists) return alert("مكرر");

    records.push({
        group,name,lesson,status,payment,late,notes,date,amount:0
    });

    save();
}

/* DELETE */

function deleteRecord(i){
    if(!confirm("حذف؟")) return;
    records.splice(i,1);
    save();
}

/* TABLE */

function render(){
    let t=document.getElementById("table");
    t.innerHTML="";

    records.forEach((r,i)=>{
        t.innerHTML+=`
        <tr>
        <td>${r.group}</td>
        <td>${r.name}</td>
        <td>${r.lesson}</td>
        <td>${r.date}</td>
        <td>${r.status}</td>
        <td>${r.payment}</td>
        <td>${r.late}</td>
        <td>${r.notes||""}</td>
        <td><button class="invoice">فاتورة</button></td>
        <td><button class="editBtn" onclick="openEdit(${i})">تعديل</button></td>
        <td><button class="danger" onclick="deleteRecord(${i})">حذف</button></td>
        </tr>`;
    });
}

/* EDIT */

function openEdit(i){
    editIndex=i;
    let r=records[i];

    document.getElementById("modal").style.display="block";

    document.getElementById("editName").value=r.name;
    document.getElementById("editGroup").value=r.group;
    document.getElementById("editLesson").value=r.lesson;
    document.getElementById("editDate").value=r.date;
    document.getElementById("editStatus").value=r.status;
    document.getElementById("editPayment").value=r.payment;
    document.getElementById("editLate").value=r.late;
    document.getElementById("editNotes").value=r.notes;
}

function saveEdit(){
    let r=records[editIndex];

    r.name=document.getElementById("editName").value;
    r.group=document.getElementById("editGroup").value;
    r.lesson=document.getElementById("editLesson").value;
    r.date=document.getElementById("editDate").value;
    r.status=document.getElementById("editStatus").value;
    r.payment=document.getElementById("editPayment").value;
    r.late=document.getElementById("editLate").value;
    r.notes=document.getElementById("editNotes").value;

    save();
    closeModal();
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* EXPORT JSON */

function exportJSON(){
    let data={groups,records};
    let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.json";
    a.click();
}

/* EXPORT EXCEL */

function exportExcel(){
    let ws=XLSX.utils.json_to_sheet(records);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"students");
    XLSX.writeFile(wb,"data.xlsx");
}

/* IMPORT JSON */

function importJSON(e){
    let file=e.target.files[0];
    let reader=new FileReader();

    reader.onload=function(ev){
        let data=JSON.parse(ev.target.result);
        groups=data.groups||[];
        records=data.records||[];
        save();
    };

    reader.readAsText(file);
}

/* INIT */

renderGroups();
render();

</script>

</body>
</html>
