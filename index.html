<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Big Hero Robotics Students CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4712/4712139.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding-bottom: 20px;
}

header {
    padding: 20px 10px;
    font-size: 20px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.3);
}

.box {
    padding: 15px;
    max-width: 1200px;
    margin: 0 auto;
}

.form-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 15px;
}

input, select, textarea {
    padding: 10px;
    border: none;
    border-radius: 8px;
    width: 100%;
    max-width: 200px;
    font-size: 14px;
}

textarea {
    height: 40px;
    resize: none;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    transition: background 0.2s;
}

button:active {
    transform: scale(0.98);
}

.add { background: #00c853; color: white; }
.danger { background: #e53935; color: white; }
.editBtn { background: #03a9f4; color: white; }
.invoice { background: #ff9800; color: white; }

hr {
    border: 0;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
    margin: 20px 0;
}

.table-container {
    width: 100%;
    overflow-x: auto;
    margin-top: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

table {
    width: 100%;
    border-collapse: collapse;
    background: rgba(255, 255, 255, 0.05);
    min-width: 800px;
}

th, td {
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 10px 8px;
    font-size: 13px;
    text-align: center;
}

th {
    background: rgba(0, 0, 0, 0.4);
}

#modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    padding: 20px;
    z-index: 9999;
    overflow-y: auto;
}

.modal-content {
    background: white;
    color: black;
    width: 100%;
    max-width: 360px;
    margin: 30px auto;
    padding: 20px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.modal-content input, .modal-content select, .modal-content textarea {
    max-width: 100%;
    border: 1px solid #ccc;
}

.modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 10px;
}
.made-by {
    font-size: 12px;
    color: #e2e8f0;
    font-style: italic;
    background: rgba(255,255,255,0.1);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    font-family: 'Comic Sans MS', Tahoma, sans-serif;
}

/* تنسيق مخفي للفاتورة يتم استخدامه عند التصدير لـ PDF فقط */
#invoice-template {
    display: none;
}
</style>
</head>

<body>

<header>🤖 Big Hero Robotics Students CRM</header>
    <div class="made-by">Made by Eagle Coders Studio</div>
<div class="box">

<div class="form-group">
    <input type="text" id="groupName" placeholder="المجموعة">
    <button class="add" onclick="addGroup()">➕ إضافة مجموعة</button>
</div>

<div class="form-group">
    <select id="groups"></select>
    <button class="danger" onclick="deleteGroup()">🗑️ حذف المجموعة</button>
</div>

<hr>

<div class="form-group">
    <input type="text" id="studentName" placeholder="اسم الطالب">
    <input type="number" id="lessonNumber" placeholder="رقم الحصة">
    <select id="status">
        <option>حاضر</option>
        <option>غائب</option>
    </select>
    <select id="payment">
        <option>مدفوع</option>
        <option>غير مدفوع</option>
    </select>
    <input type="number" id="late" placeholder="غرامة">
    <textarea id="notes" placeholder="ملاحظات"></textarea>
    <input type="date" id="date">
</div>

<div class="form-group">
    <button class="add" style="max-width: 250px; width: 100%;" onclick="addStudent()">➕ إضافة طالب</button>
</div>

<hr>

<div class="form-group">
    <button onclick="exportJSON()" class="add">📤 JSON</button>
    <button onclick="exportExcel()" class="add">📊 Excel</button>
    <button class="add" onclick="document.getElementById('fileInput').click()">📥 استيراد</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importJSON(event)">
</div>

<hr>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>المجموعة</th>
                <th>الاسم</th>
                <th>الحصة</th>
                <th>التاريخ</th>
                <th>الحضور</th>
                <th>الدفع</th>
                <th>غرامة</th>
                <th>ملاحظات</th>
                <th>فاتورة</th>
                <th>تعديل</th>
                <th>حذف</th>
            </tr>
        </thead>
        <tbody id="table"></tbody>
    </table>
</div>

</div>

<div id="modal">
    <div class="modal-content">
        <h3>✏️ تعديل الطالب</h3>
        <input id="editName" placeholder="الاسم">
        <input id="editGroup" placeholder="المجموعة">
        <input id="editLesson" type="number" placeholder="الحصة">
        <input id="editDate" type="date">
        <select id="editStatus">
            <option>حاضر</option>
            <option>غائب</option>
        </select>
        <select id="editPayment">
            <option>مدفوع</option>
            <option>غير مدفوع</option>
        </select>
        <input id="editLate" type="number" placeholder="غرامة">
        <textarea id="editNotes" placeholder="ملاحظات"></textarea>
        
        <div class="modal-buttons">
            <button class="add" onclick="saveEdit()">💾 حفظ</button>
            <button class="danger" onclick="closeModal()">❌ إغلاق</button>
        </div>
    </div>
</div>

<div id="invoice-holder"></div>

<script>
let groups = JSON.parse(localStorage.getItem("groups")) || [];
let records = JSON.parse(localStorage.getItem("records")) || [];
let editIndex = null;

document.getElementById("date").valueAsDate = new Date();

function save(){
    localStorage.setItem("groups",JSON.stringify(groups));
    localStorage.setItem("records",JSON.stringify(records));
    renderGroups();
    render();
}

/* GROUPS */
function addGroup(){
    let g=document.getElementById("groupName").value.trim();
    if(!g) return;
    if(groups.includes(g)) return alert("موجود");
    groups.push(g);
    document.getElementById("groupName").value = "";
    save();
}

function deleteGroup(){
    let g=document.getElementById("groups").value;
    if(!g || !confirm("حذف المجموعة؟")) return;
    groups=groups.filter(x=>x!==g);
    records=records.filter(r=>r.group!==g);
    save();
}

function renderGroups(){
    let sel=document.getElementById("groups");
    sel.innerHTML="";
    groups.forEach(g=>{
        sel.innerHTML+=`<option>${g}</option>`;
    });
}

/* ADD */
function addStudent(){
    let name=document.getElementById("studentName").value.trim();
    let group=document.getElementById("groups").value;
    let lesson=document.getElementById("lessonNumber").value||1;
    let status=document.getElementById("status").value;
    let payment=document.getElementById("payment").value;
    let late=document.getElementById("late").value||0;
    let notes=document.getElementById("notes").value;
    let date=document.getElementById("date").value;

    if(!name||!group) return alert("يرجى التأكد من اختيار مجموعة وإدخال اسم الطالب");

    let exists=records.some(r=>
        r.name===name && r.group===group && r.lesson==lesson
    );

    if(exists) return alert("مكرر");

    records.push({
        group,name,lesson,status,payment,late,notes,date,amount:0
    });

    document.getElementById("studentName").value = "";
    document.getElementById("late").value = "";
    document.getElementById("notes").value = "";

    save();
}

/* DELETE */
function deleteRecord(i){
    if(!confirm("حذف السجل؟")) return;
    records.splice(i,1);
    save();
}

/* TABLE */
function render(){
    let t=document.getElementById("table");
    t.innerHTML="";

    records.forEach((r,i)=>{
        t.innerHTML+=`
        <tr>
        <td>${r.group}</td>
        <td>${r.name}</td>
        <td>${r.lesson}</td>
        <td>${r.date}</td>
        <td>${r.status}</td>
        <td>${r.payment}</td>
        <td>${r.late}</td>
        <td>${r.notes||""}</td>
        <td><button class="invoice" onclick="generatePDF(${i})">فاتورة</button></td>
        <td><button class="editBtn" onclick="openEdit(${i})">تعديل</button></td>
        <td><button class="danger" onclick="deleteRecord(${i})">حذف</button></td>
        </tr>`;
    });
}

/* EDIT */
function openEdit(i){
    editIndex=i;
    let r=records[i];

    document.getElementById("modal").style.display="block";

    document.getElementById("editName").value=r.name;
    document.getElementById("editGroup").value=r.group;
    document.getElementById("editLesson").value=r.lesson;
    document.getElementById("editDate").value=r.date;
    document.getElementById("editStatus").value=r.status;
    document.getElementById("editPayment").value=r.payment;
    document.getElementById("editLate").value=r.late;
    document.getElementById("editNotes").value=r.notes;
}

function saveEdit(){
    let r=records[editIndex];

    r.name=document.getElementById("editName").value;
    r.group=document.getElementById("editGroup").value;
    r.lesson=document.getElementById("editLesson").value;
    r.date=document.getElementById("editDate").value;
    r.status=document.getElementById("editStatus").value;
    r.payment=document.getElementById("editPayment").value;
    r.late=document.getElementById("editLate").value;
    r.notes=document.getElementById("editNotes").value;

    save();
    closeModal();
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

/* تفعيل زر الفاتورة وتحميلها PDF */
function generatePDF(i) {
    let r = records[i];
    let holder = document.getElementById("invoice-holder");
    
    // تصميم شكل الفاتورة التي ستظهر في الـ PDF
    holder.innerHTML = `
        <div id="invoice-card" style="padding: 30px; font-family: Arial, sans-serif; color: #333; direction: rtl; background: #fff; border: 1px solid #eee;">
            <div style="text-align: center; margin-bottom: 25px; border-bottom: 3px solid #203a43; padding-bottom: 15px;">
                <h1 style="margin: 0; color: #203a43; font-size: 26px;">🤖 Big Hero Robotics</h1>
                <p style="margin: 5px 0 0 0; color: #666; font-size: 14px;">أكاديمية تكنولوجيا الروبوت والذكاء الاصطناعي</p>
            </div>
            
            <h3 style="text-align: center; background: #2c5364; color: white; padding: 6px; margin-bottom: 25px; border-radius: 4px;">فاتورة حضور حصة</h3>
            
            <div style="margin-bottom: 20px; font-size: 15px; line-height: 1.6;">
                <p><strong>اسم الطالب:</strong> ${r.name}</p>
                <p><strong>المجموعة:</strong> ${r.group}</p>
                <p><strong>رقم الحصة:</strong> ${r.lesson}</p>
                <p><strong>التاريخ:</strong> ${r.date}</p>
            </div>
            
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px;">
                <thead>
                    <tr style="background: #f5f5f5;">
                        <th style="border: 1px solid #ddd; padding: 10px; text-align: center; color:#333;">البند</th>
                        <th style="border: 1px solid #ddd; padding: 10px; text-align: center; color:#333;">الحالة / القيمة</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">حالة الحضور</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center; font-weight: bold;">${r.status}</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">حالة الدفع الأساسية</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center; font-weight: bold; color: ${r.payment === 'مدفوع' ? 'green' : 'red'}">${r.payment}</td>
                    </tr>
                    <tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">غرامة / رسوم إضافية</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: center; font-weight: bold;">${r.late} ج.م</td>
                    </tr>
                    ${r.notes ? `<tr>
                        <td style="border: 1px solid #ddd; padding: 10px;">ملاحظات</td>
                        <td style="border: 1px solid #ddd; padding: 10px; text-align: right; font-size: 12px; color: #55px;">${r.notes}</td>
                    </tr>` : ''}
                </tbody>
            </table>
            
            <div style="margin-top: 40px; text-align: center; font-size: 12px; color: #888; border-top: 1px dashed #ddd; padding-top: 15px;">
                شكرًا لثقتكم بأكاديميتنا ونراكم في الحصة القادمة المبدعة! 🚀
            </div>
        </div>
    `;

    // إعدادات مكتبة html2pdf
    let opt = {
        margin:       10,
        filename:     `فاتورة_${r.name}_حصة_${r.lesson}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true },
        jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // تشغيل عملية التصدير والتحميل فوراً
    html2pdf().set(opt).from(holder).save().then(() => {
        // تنظيف الحاوية بعد انتهاء التحميل لكي لا تؤثر على الواجهة
        holder.innerHTML = "";
    });
}

/* EXPORT JSON */
function exportJSON(){
    let data={groups,records};
    let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    let a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="data.json";
    a.click();
}

/* EXPORT EXCEL */
function exportExcel(){
    let ws=XLSX.utils.json_to_sheet(records);
    let wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"students");
    XLSX.writeFile(wb,"data.xlsx");
}

/* IMPORT JSON */
function importJSON(e){
    let file=e.target.files[0];
    if(!file) return;
    let reader=new FileReader();

    reader.onload=function(ev){
        try {
            let data=JSON.parse(ev.target.result);
            groups=data.groups||[];
            records=data.records||[];
            save();
        } catch(err) {
            alert("ملف غير صالح");
        }
    };

    reader.readAsText(file);
}

/* INIT */
renderGroups();
render();
</script>

</body>
</html>
